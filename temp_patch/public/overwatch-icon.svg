<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="12" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="24" fill="#00d4ff"/>
  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="256" y2="76" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <!-- Target markers -->
  <circle cx="320" cy="180" r="8" fill="#22c55e"/>
  <circle cx="180" cy="300" r="8" fill="#f59e0b"/>
  <circle cx="350" cy="320" r="8" fill="#ef4444"/>
</svg>
